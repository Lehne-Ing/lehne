title: Assistenz der Geschäftsführung (m/w/d)

description: Als Assistenz der Geschäftsführung (m/w/d) bei LEHNE ing. arbeitest Du ab dem ersten Tag eng mit der Geschäftsführung und den Projektteams zusammen. Du unterstützt im Auftrags- und Rechnungsmanagement, begleitest Angebots- und Vertragsprozesse und sorgst für strukturierte Abläufe im Office-Alltag.

aufgaben:
  - Vertrags- und Rechnungsmanagement unserer Projekte nach Leistungsstand
  - Angebotsunterlagen erstellen und Auftragsverhandlungen begleiten
  - Personalmanagement und Vorbereitung der Finanzbuchhaltung
  - Organisation von Fachveranstaltungen und Teambuilding-Events
  - Vielfältige Tätigkeiten in den Bereichen Prozess- und Projektcontrolling  

profil:
  - Eine passende abgeschlossene Ausbildung oder ein Studium
  - Vorzugsweise bringst Du erste Berufserfahrungen mit oder bist ein engagierter Quereinsteiger
  - Eine schnelle Auffassungsgabe, sicheres und kommunikatives Auftreten und strukturierte Arbeitsweise zeichnen Dich aus
  - Die Anwendungen von MS Office (insbesondere Word, Excel, PowerPoint, Outlook) sind für Dich selbstverständlich
  - Sehr gute Deutschkenntnisse in Wort und Schrift

angebot:
  - Es erwarten Dich individuelle Karrieremöglichkeiten mit der Chance Deine Fähigkeiten langfristig weiterzuentwickeln
  - Du hast einen attraktiven Arbeitsplatz mit modernster technischer Ausstattung in Hamburg St. Georg und einem dynamischen Team
  - Ein vertrauensvolles Miteinander, unkomplizierte Kommunikation und persönliches Mentoring bilden die Grundlagen für unseren gemeinsamen Erfolg
