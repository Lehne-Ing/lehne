title: Management Assistant (m/f/d)

description: As a Management Assistant (m/f/d) at LEHNE ing, you will work closely with the management and project teams from day one. You will provide support in order and invoice management, assist with quotation and contract processes, and ensure structured workflows in everyday office life.

aufgaben:
- Contract and invoice management for our projects according to performance level
- Preparing quotation documents and supporting order negotiations
- Personnel management and preparation of financial accounting
- Organization of specialist events and team-building events
- A wide range of activities in the areas of process and project controlling  
profil:
- A suitable completed training or degree
- Preferably, you have some initial professional experience or are a committed career changer
- You are quick on the uptake, confident and communicative, and have a structured approach to your work
- You are proficient in MS Office applications (especially Word, Excel, PowerPoint, Outlook)
- Very good written and spoken German
angebot:
- You can expect individual career opportunities with the chance to develop your skills in the long term
- You have an attractive workplace with state-of-the-art technical equipment in Hamburg St. Georg and a dynamic team
- A trusting relationship, uncomplicated communication and personal mentoring form the basis for our joint success.